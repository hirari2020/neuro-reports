<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>2026年 最新動向レポート｜患者会 会報誌</title>
<style>
  :root {
    --paper:#F2F1EB; --surface:#FCFBF7; --ink:#1D2A2A; --ink-soft:#55635F; --line:#DEDBD0; --accent:#3F5B57;
    --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","YuGothic","Noto Sans JP","Meiryo",system-ui,sans-serif;
    --serif:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP","MS PMincho",serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans);
    line-height:1.85; -webkit-font-smoothing:antialiased; padding:clamp(24px,6vw,72px) clamp(16px,4vw,32px) 72px; }
  .wrap { max-width:680px; margin:0 auto; }
  .back { display:inline-block; font-size:13px; font-weight:700; color:var(--ink-soft); text-decoration:none; margin:0 0 22px; }
  .back:hover { color:var(--ink); }
  .eyebrow { font-size:12.5px; letter-spacing:.16em; color:var(--ink-soft); font-weight:700; margin:0 0 12px; }
  h1 { font-family:var(--serif); font-weight:700; font-size:clamp(26px,5vw,38px); line-height:1.3; margin:0 0 10px; }
  .sub { color:var(--ink-soft); font-size:15px; margin:0 0 32px; }
  .issues { display:grid; gap:12px; }
  .issue { display:flex; align-items:center; gap:16px; background:var(--surface); border:1px solid var(--line);
    border-left:5px solid var(--accent); border-radius:8px; padding:18px 22px; text-decoration:none; color:inherit;
    transition:transform .12s ease, box-shadow .12s ease; }
  .issue:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.06); }
  .issue:focus-visible { outline:2px solid var(--accent); outline-offset:3px; }
  .issue .no { font-family:var(--serif); font-weight:700; font-size:19px; }
  .issue .desc { color:var(--ink-soft); font-size:13.5px; }
  .issue .arrow { margin-left:auto; color:var(--accent); font-size:18px; }
  .foot { margin-top:36px; border-top:1px solid var(--line); padding-top:20px; font-size:13px; color:var(--ink-soft); line-height:1.8; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../">← 全体の目次へ</a>
    <p class="eyebrow">患者会 会報誌 ｜ バックナンバー</p>
    <h1>2026年 最新動向レポート</h1>
    <p class="sub">自己免疫性末梢神経・脳幹疾患 5疾患（GBS・MFS・BBE・MMN・CIDP）</p>

    <div class="issues">
      <a class="issue" href="07/">
        <span class="no">7月号</span>
        <span class="desc">2026年7月4日 発行</span>
        <span class="arrow">→</span>
      </a>
    </div>

    <div class="foot">
      各レポートはPubMed掲載の実在論文をAIが要約したものです。医療上の助言ではありません。公開範囲：リンクを知る方のみ（検索エンジンには登録されません）。
    </div>
  </div>
</body>
</html>
